<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký</title>
    <meta charset="UTF-8">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .register-box {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="register-box">

    <h3 class="text-center mb-4">Đăng ký</h3>

    <!-- FORM REGISTER -->
    <form method="post" action="/auth/register">

        <!-- EMAIL -->
        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Nhập email"
                   required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <label>Mật khẩu</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Nhập mật khẩu"
                   required>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="mb-3">
            <label>Nhập lại mật khẩu</label>
            <input type="password"
                   name="confirmPassword"
                   class="form-control"
                   placeholder="Nhập lại mật khẩu"
                   required>
        </div>

        <!-- SUCCESS -->
        <div th:if="${param.success}" class="text-success mb-3">
            Đăng ký thành công! Hãy đăng nhập
        </div>

        <!-- ERROR -->
        <div th:if="${param.error}" class="text-danger mb-3">
            Đăng ký thất bại!
        </div>

        <button type="submit" class="btn btn-success w-100">
            Đăng ký
        </button>

    </form>

    <hr>

    <div class="text-center">
        <p>Đã có tài khoản?</p>
        <a href="/login" class="btn btn-outline-primary w-100">
            Đăng nhập
        </a>
    </div>

</div>

</body>
</html>
