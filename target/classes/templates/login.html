<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập</title>
    <meta charset="UTF-8">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="login-box">

    <h3 class="text-center mb-4">Đăng nhập</h3>

    <!-- 🔥 FORM CHUẨN SPRING SECURITY -->
    <form method="post" action="/login">

        <!-- EMAIL -->
        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="username"
                   class="form-control"
                   placeholder="Nhập email"
                   required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <label>Mật khẩu</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Nhập mật khẩu"
                   required>
        </div>

        <!-- ERROR -->
        <div th:if="${param.error}" class="text-danger mb-3">
            Sai email hoặc mật khẩu!
        </div>

        <!-- LOGOUT SUCCESS -->
        <div th:if="${param.logout}" class="text-success mb-3">
            Đăng xuất thành công!
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Đăng nhập
        </button>

    </form>

    <hr>

    <div class="text-center">
        <p>Chưa có tài khoản?</p>
        <a href="/register" class="btn btn-outline-secondary w-100">
            Đăng ký
        </a>
    </div>

</div>

</body>
</html>
